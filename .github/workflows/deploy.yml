---
name: deploy

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get the address assigned to the en0 network interface
        run: |
          echo First try
          ifconfig

          echo Second try
          ifconfig en0 | grep inet | awk '$1=="inet" {print $2}'| tr -d '\n'
      - name: Deploy devnet
        uses: kurtosis-tech/kurtosis-github-action@v1
        with:
          path: .
